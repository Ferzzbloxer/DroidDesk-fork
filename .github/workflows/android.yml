name: Build Android APK

on:
  push:
    branches:
      - Test-(root) 
    tags:
      - 'v*'
  pull_request:
    branches:
      - Test-(root)
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # Updated to v4's latest execution runtime or v5 where applicable
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fetch Dependencies / Prepare Environment
        run: |
          chmod +x fetch_deps.sh
          ./fetch_deps.sh
        continue-on-error: true

      - name: Install Project Dependencies
        run: |
          cd app
          flutter pub get

      - name: Compile Release APK
        run: |
          cd app
          flutter build apk --release

      # Updated to v4's latest runtime patch
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DroidDesk-Release-APK
          path: app/build/app/outputs/flutter-apk/app-release.apk
